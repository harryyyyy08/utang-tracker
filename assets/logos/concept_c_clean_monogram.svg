<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#283593"/>
      <stop offset="50%" style="stop-color:#1E88E5"/>
      <stop offset="100%" style="stop-color:#29B6F6"/>
    </linearGradient>
    <linearGradient id="gloss3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:white;stop-opacity:0.22"/>
      <stop offset="50%" style="stop-color:white;stop-opacity:0.0"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#43A047"/>
      <stop offset="100%" style="stop-color:#A5D6A7"/>
    </linearGradient>
    <filter id="shadow3">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#1A237E" flood-opacity="0.6"/>
    </filter>
    <filter id="textShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0D1B6E" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg3)" filter="url(#shadow3)"/>
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#gloss3)"/>
  <rect x="7" y="7" width="498" height="498" rx="107"
        fill="none" stroke="white" stroke-width="1.5" stroke-opacity="0.15"/>

  <!-- Decorative rings (subtle depth) -->
  <circle cx="256" cy="256" r="195" fill="none" stroke="white" stroke-width="1" stroke-opacity="0.06"/>
  <circle cx="256" cy="256" r="165" fill="none" stroke="white" stroke-width="1" stroke-opacity="0.06"/>

  <!-- "U" letter — left side -->
  <!-- U shape: two pillars + bottom curve -->
  <rect x="105" y="145" width="52" height="175" rx="26" fill="white" filter="url(#textShadow)"/>
  <rect x="218" y="145" width="52" height="175" rx="26" fill="white" filter="url(#textShadow)"/>
  <rect x="105" y="270" width="165" height="52" rx="26" fill="white" filter="url(#textShadow)"/>

  <!-- "T" letter — right side -->
  <!-- T top bar -->
  <rect x="262" y="145" width="155" height="50" rx="25" fill="white" filter="url(#textShadow)"/>
  <!-- T stem -->
  <rect x="315" y="145" width="50" height="177" rx="25" fill="white" filter="url(#textShadow)"/>

  <!-- Green gradient accent bar -->
  <rect x="80" y="345" width="352" height="14" rx="7" fill="url(#accentLine)"/>

  <!-- Tagline -->
  <text x="256" y="415"
        font-family="Arial, sans-serif" font-size="24" font-weight="600"
        fill="white" text-anchor="middle" letter-spacing="6" opacity="0.85">UTANG TRACKER</text>

  <!-- Small peso symbol accent -->
  <circle cx="256" cy="470" r="18" fill="white" opacity="0.12"/>
  <text x="256" y="478"
        font-family="Arial, sans-serif" font-size="20" font-weight="900"
        fill="white" text-anchor="middle" opacity="0.7">₱</text>
</svg>
